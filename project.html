<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project — Carter</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1e1e24; --surface: #27272f; --card: #2e2e38; --border: #38383f;
      --text: #eeedf2; --muted: #7e7d8f; --soft: #a09fb5;
      --accent: #a78bfa; --accent-dim: #2e2845; --accent-glow: rgba(167,139,250,0.12);
      --amber: #fbbf24; --amber-dim: #2d2410;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 3rem; background: var(--surface);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--text); text-decoration: none; }
    .back-link { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; font-weight: 700; color: var(--muted); text-decoration: none; padding: 0.45rem 1rem; border-radius: 999px; transition: all 0.2s; }
    .back-link:hover { background: var(--card); color: var(--text); }

    .page { max-width: 860px; margin: 0 auto; padding: 4rem 3rem 6rem; }

    .breadcrumb { font-size: 0.72rem; font-weight: 600; color: var(--muted); margin-bottom: 2.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .breadcrumb a { color: var(--accent); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb-sep { color: var(--border); }

    .project-period { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.6rem; }
    .project-title { font-family: 'Outfit', sans-serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 1rem; }
    .project-desc { font-size: 0.95rem; color: var(--muted); line-height: 1.8; font-weight: 400; max-width: 640px; margin-bottom: 2rem; }

    .tags-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .tag { font-size: 0.68rem; font-weight: 700; padding: 0.25rem 0.75rem; border-radius: 999px; background: var(--surface); color: var(--soft); border: 1px solid var(--border); }

    .project-image { width: 100%; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; background: linear-gradient(135deg, var(--accent-dim), var(--surface)); border: 1px solid var(--border); margin-bottom: 3rem; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .project-image img { width: 100%; height: 100%; object-fit: cover; }

    /* Meter+description grouped cards */
    .meter-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 1.6rem 2rem; margin-bottom: 1.2rem;
    }
    .meter-card-header { display: flex; align-items: center; gap: 1.2rem; margin-bottom: 1rem; }
    .meter-card-title { font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .meter-bars { display: flex; gap: 5px; }
    .bar { width: 28px; height: 10px; border-radius: 999px; background: var(--border); }
    .bar.filled-ai { background: var(--accent); }
    .bar.filled-tutorial { background: var(--amber); }
    .meter-level { font-size: 0.72rem; font-weight: 700; color: var(--soft); }
    .meter-card-desc { font-size: 0.85rem; color: var(--soft); line-height: 1.8; }
    .meter-card-desc a { color: var(--accent); text-decoration: underline; }
    .meter-card-desc a:hover { opacity: 0.8; }
    .content-section p a { color: var(--accent); text-decoration: underline; }
    .content-section p a:hover { opacity: 0.8; }
    .project-desc a { color: var(--accent); text-decoration: underline; }
    .project-desc a:hover { opacity: 0.8; }

    /* About section */
    .content-section { margin-bottom: 2.5rem; }
    .content-section h2 { font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
    .content-section p { font-size: 0.88rem; color: var(--soft); line-height: 1.85; margin-bottom: 0.6rem; }

    /* Rendered markdown details */
    .details-body { font-size: 0.88rem; color: var(--soft); line-height: 1.85; }
    .details-body h2 { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); margin: 1.8rem 0 0.5rem; }
    .details-body h3 { font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 700; color: var(--accent); margin: 1.2rem 0 0.4rem; }
    .details-body p { margin-bottom: 0.6rem; }
    .details-body ul { padding-left: 1.4rem; margin-bottom: 0.6rem; }
    .details-body ul ul { margin-top: 0.25rem; margin-bottom: 0; }
    .details-body li { margin-bottom: 0.25rem; }
    .details-body code { font-family: 'Courier New', monospace; font-size: 0.82rem; background: var(--card); color: var(--accent); border: 1px solid var(--border); border-radius: 4px; padding: 0.1em 0.4em; }
    .details-body a { color: var(--accent); text-decoration: underline; }
    .details-body a:hover { opacity: 0.8; }
    .details-body strong { color: var(--text); font-weight: 700; }

    .links-row { display: flex; gap: 0.8rem; margin-top: 3rem; }
    .link-btn { display: inline-flex; align-items: center; gap: 0.5rem; font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700; padding: 0.7rem 1.5rem; border-radius: 999px; text-decoration: none; transition: all 0.2s; }
    .link-btn.primary { background: var(--accent); color: #fff; box-shadow: 0 0 20px var(--accent-glow); }
    .link-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px var(--accent-glow); }
    .link-btn.ghost { border: 1px solid var(--border); color: var(--muted); }
    .link-btn.ghost:hover { color: var(--text); border-color: var(--soft); }

    .not-found { text-align: center; padding: 6rem 2rem; }
    .not-found h1 { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
    .not-found p { color: var(--muted); margin-bottom: 2rem; }

    footer { background: var(--surface); border-top: 1px solid var(--border); padding: 2rem 3rem; display: flex; justify-content: space-between; }
    footer p { font-size: 0.75rem; color: var(--muted); }
    .footer-dot { color: var(--accent); margin: 0 0.4rem; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .page { animation: fadeUp 0.45s ease forwards; }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Home</a>
  <a class="back-link" href="index.html">← Back to projects</a>
</nav>

<main class="page" id="main-content">
  <div class="not-found" id="not-found" style="display:none;">
    <h1>Project not found.</h1>
    <p>That project doesn't exist or has been removed.</p>
    <a href="index.html" class="link-btn primary">← Back home</a>
  </div>
</main>

<footer>
  <p>© 2026 Carter</p>
  <p>Built with AI<span class="footer-dot">✦</span>GitHub Pages</p>
</footer>

<script src="data.js"></script>
<script>
  const aiLabels      = ['None', 'Minimal', 'Partial', 'Heavy', 'Almost entirely AI'];
  const tutorialLabels = ['None', 'Minimal', 'Partial', 'Mostly followed', 'Fully followed'];

  // Inline markdown formatter: **bold**, `code`, [link](url)
  function inlineFormat(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  }

  // Minimal markdown → HTML renderer (supports ## h2, ### h3, - lists, **bold**, `code`, [link](url))
  function renderMarkdown(md) {
    const lines = md.split('\n');
    let html = '';
    let inList = false;
    let listDepth = 0;

    function closeLists(targetDepth) {
      while (listDepth > targetDepth) { html += '</ul>'; listDepth--; }
    }

    for (let i = 0; i < lines.length; i++) {
      const raw = lines[i];
      const trimmed = raw.trimEnd();

      // Headings
      if (/^## /.test(trimmed)) {
        closeLists(0); inList = false;
        html += `<h2>${inlineFormat(trimmed.slice(3))}</h2>`;
        continue;
      }
      if (/^### /.test(trimmed)) {
        closeLists(0); inList = false;
        html += `<h3>${inlineFormat(trimmed.slice(4))}</h3>`;
        continue;
      }

      // List items (support one level of nesting via leading spaces)
      const liMatch = trimmed.match(/^(\s*)- (.+)/);
      if (liMatch) {
        const depth = liMatch[1].length > 0 ? 2 : 1;
        if (!inList) { html += '<ul>'; listDepth = 1; inList = true; }
        if (depth > listDepth) { html += '<ul>'; listDepth++; }
        if (depth < listDepth) { closeLists(depth); }
        html += `<li>${inlineFormat(liMatch[2])}</li>`;
        continue;
      }

      // Blank line
      if (trimmed === '') {
        closeLists(0); inList = false;
        continue;
      }

      // Paragraph
      closeLists(0); inList = false;
      html += `<p>${inlineFormat(trimmed)}</p>`;
    }

    closeLists(0);
    return html;
  }

  function buildBars(count, filledClass) {
    return [1,2,3,4].map(i => `<div class="bar ${i <= count ? filledClass : ''}"></div>`).join('');
  }

  const params  = new URLSearchParams(window.location.search);
  const id      = params.get('id');
  const project = projects.find(p => p.id === id);
  const main    = document.getElementById('main-content');

  if (!project) {
    document.getElementById('not-found').style.display = 'block';
  } else {
    document.title = `${project.title} — Carter`;

    const imgContent = project.image
      ? `<img src="${project.image}" alt="${project.title}" onerror="this.style.display='none'">`
      : 'NO IMAGE';

    const tagsHTML = project.tags.map(t => `<span class="tag">${t}</span>`).join('');

    // AI meter card — always shown, grouped with AI description
    const aiCard = `
      <div class="meter-card">
        <div class="meter-card-header">
          <span class="meter-card-title">AI Use</span>
          <div class="meter-bars">${buildBars(project.aiUse, 'filled-ai')}</div>
          <span class="meter-level">${aiLabels[project.aiUse]}</span>
        </div>
        <p class="meter-card-desc">${inlineFormat(project.aiDescription)}</p>
      </div>`;

    // Tutorial meter card — only shown if tutorialUse > 0, grouped with tutorial description
    const tutorialCard = project.tutorialUse > 0 ? `
      <div class="meter-card">
        <div class="meter-card-header">
          <span class="meter-card-title">Tutorial Use</span>
          <div class="meter-bars">${buildBars(project.tutorialUse, 'filled-tutorial')}</div>
          <span class="meter-level">${tutorialLabels[project.tutorialUse]}</span>
        </div>
        <p class="meter-card-desc">${inlineFormat(project.tutorialDescription)}</p>
      </div>` : '';

    const liveBtn   = project.links?.live   ? `<a href="${project.links.live}"   target="_blank" class="link-btn primary">View Live ↗</a>` : '';
    const githubBtn = project.links?.github ? `<a href="${project.links.github}" target="_blank" class="link-btn ghost">GitHub ↗</a>` : '';

    main.innerHTML = `
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep">/</span>
        <span>${project.title}</span>
      </div>

      <span class="project-period">${project.dateRange}</span>
      <h1 class="project-title">${project.title}</h1>
      <p class="project-desc">${inlineFormat(project.description[0])}</p>

      <div class="tags-row">${tagsHTML}</div>

      <div class="project-image">${imgContent}</div>

      <div class="content-section">
        <h2>About This Project</h2>
        ${project.description.map(p => `<p>${inlineFormat(p)}</p>`).join('\n        ')}
        ${project.details ? `<div class="details-body">${renderMarkdown(project.details)}</div>` : ''}
      </div>

      ${aiCard}
      ${tutorialCard}

      <div class="links-row">
        ${liveBtn}
        ${githubBtn}
      </div>
    `;
  }
</script>
</body>
</html>
