<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project — Carter</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1e1e24;
      --surface: #27272f;
      --card: #2e2e38;
      --border: #38383f;
      --text: #eeedf2;
      --muted: #7e7d8f;
      --soft: #a09fb5;
      --accent: #a78bfa;
      --accent-dim: #2e2845;
      --accent-glow: rgba(167,139,250,0.12);
      --green: #6ee7b7;
      --green-dim: #1a3330;
      --amber: #fbbf24;
      --amber-dim: #2d2410;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

    /* ── NAV ── */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 3rem;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .back-link {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.82rem; font-weight: 700; color: var(--muted);
      text-decoration: none; padding: 0.45rem 1rem;
      border-radius: 999px; transition: all 0.2s;
    }
    .back-link:hover { background: var(--card); color: var(--text); }

    /* ── MAIN LAYOUT ── */
    .page { max-width: 860px; margin: 0 auto; padding: 4rem 3rem 6rem; }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      font-size: 0.72rem; font-weight: 600; color: var(--muted);
      margin-bottom: 2.5rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .breadcrumb a { color: var(--accent); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb-sep { color: var(--border); }

    /* ── HERO BLOCK ── */
    .project-hero { margin-bottom: 2.5rem; }
    .project-period {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); display: block; margin-bottom: 0.6rem;
    }
    .project-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800; letter-spacing: -0.03em; line-height: 1.05;
      margin-bottom: 1rem;
    }
    .project-desc { font-size: 0.95rem; color: var(--muted); line-height: 1.8; font-weight: 400; max-width: 640px; }

    /* ── TAGS ── */
    .tags-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .tag {
      font-size: 0.68rem; font-weight: 700; padding: 0.25rem 0.75rem;
      border-radius: 999px; background: var(--surface);
      color: var(--soft); border: 1px solid var(--border);
    }

    /* ── PREVIEW IMAGE ── */
    .project-image {
      width: 100%; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden;
      background: linear-gradient(135deg, var(--accent-dim), var(--surface));
      border: 1px solid var(--border); margin-bottom: 3rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .project-image img { width: 100%; height: 100%; object-fit: cover; }

    /* ── METERS PANEL ── */
    .meters-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 1.8rem 2rem; margin-bottom: 2.5rem;
      display: flex; gap: 3rem; align-items: flex-start;
    }
    .meter-block { display: flex; flex-direction: column; gap: 0.5rem; }
    .meter-title {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
    }
    .meter-bars { display: flex; gap: 5px; }
    .bar {
      width: 28px; height: 10px; border-radius: 999px;
      background: var(--border); transition: background 0.2s;
    }
    .bar.filled-ai { background: var(--accent); }
    .bar.filled-tutorial { background: var(--amber); }
    .meter-caption { font-size: 0.7rem; color: var(--muted); font-weight: 400; }

    /* ── CONTENT SECTIONS ── */
    .content-section { margin-bottom: 2.5rem; }
    .content-section h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .content-section p { font-size: 0.88rem; color: var(--soft); line-height: 1.85; }

    /* ── LINKS ── */
    .links-row { display: flex; gap: 0.8rem; margin-top: 3rem; }
    .link-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700;
      padding: 0.7rem 1.5rem; border-radius: 999px; text-decoration: none;
      transition: all 0.2s;
    }
    .link-btn.primary { background: var(--accent); color: #fff; box-shadow: 0 0 20px var(--accent-glow); }
    .link-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px var(--accent-glow); }
    .link-btn.ghost { border: 1px solid var(--border); color: var(--muted); }
    .link-btn.ghost:hover { color: var(--text); border-color: var(--soft); }

    /* ── NOT FOUND ── */
    .not-found { text-align: center; padding: 6rem 2rem; }
    .not-found h1 { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
    .not-found p { color: var(--muted); margin-bottom: 2rem; }

    /* ── FOOTER ── */
    footer {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 2rem 3rem; display: flex; justify-content: space-between;
    }
    footer p { font-size: 0.75rem; color: var(--muted); }
    .footer-dot { color: var(--accent); margin: 0 0.4rem; }

    /* ── AI label map ── */
    /* levels: 0=none, 1=minimal, 2=partial, 3=heavy, 4=almost entirely */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .page { animation: fadeUp 0.45s ease forwards; }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Carter<span>.</span></a>
  <a class="back-link" href="index.html">← Back to projects</a>
</nav>

<main class="page" id="main-content">
  <div class="not-found" id="not-found" style="display:none;">
    <h1>Project not found.</h1>
    <p>That project doesn't exist or has been removed.</p>
    <a href="index.html" class="link-btn primary">← Back home</a>
  </div>
</main>

<footer>
  <p>© 2025 Carter</p>
  <p>Built with AI<span class="footer-dot">✦</span>GitHub Pages</p>
</footer>

<script src="data.js"></script>
<script>
  const aiLabels = ['None', 'Minimal', 'Partial', 'Heavy', 'Almost entirely AI'];
  const tutorialLabels = ['None', 'Minimal', 'Partial', 'Mostly followed', 'Fully followed'];

  function buildBars(count, filledClass) {
    return [1,2,3,4].map(i =>
      `<div class="bar ${i <= count ? filledClass : ''}"></div>`
    ).join('');
  }

  // Read ?id= from URL
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const project = projects.find(p => p.id === id);

  const main = document.getElementById('main-content');

  if (!project) {
    document.getElementById('not-found').style.display = 'block';
  } else {
    // Update page title
    document.title = `${project.title} — Carter`;

    const imgContent = project.image
      ? `<img src="${project.image}" alt="${project.title}" onerror="this.style.display='none'">`
      : 'NO IMAGE';

    const tagsHTML = project.tags.map(t => `<span class="tag">${t}</span>`).join('');

    // Tutorial meter — only if > 0
    const tutorialMeter = project.tutorialUse > 0 ? `
      <div class="meter-block">
        <span class="meter-title">Tutorial Use</span>
        <div class="meter-bars">${buildBars(project.tutorialUse, 'filled-tutorial')}</div>
        <span class="meter-caption">${tutorialLabels[project.tutorialUse]}</span>
      </div>` : '';

    const tutorialSection = project.tutorialUse > 0 ? `
      <div class="content-section">
        <h2>Tutorial Usage</h2>
        <p>${project.tutorialDescription}</p>
      </div>` : '';

    // Live / GitHub links
    const liveBtn = project.links?.live
      ? `<a href="${project.links.live}" target="_blank" class="link-btn primary">View Live ↗</a>` : '';
    const githubBtn = project.links?.github
      ? `<a href="${project.links.github}" target="_blank" class="link-btn ghost">GitHub ↗</a>` : '';

    main.innerHTML = `
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep">/</span>
        <span>${project.title}</span>
      </div>

      <div class="project-hero">
        <span class="project-period">${project.dateRange}</span>
        <h1 class="project-title">${project.title}</h1>
        <p class="project-desc">${project.description}</p>
      </div>

      <div class="tags-row">${tagsHTML}</div>

      <div class="project-image">${imgContent}</div>

      <div class="meters-panel">
        <div class="meter-block">
          <span class="meter-title">AI Use</span>
          <div class="meter-bars">${buildBars(project.aiUse, 'filled-ai')}</div>
          <span class="meter-caption">${aiLabels[project.aiUse]}</span>
        </div>
        ${tutorialMeter}
      </div>

      <div class="content-section">
        <h2>About This Project</h2>
        <p>${project.description}</p>
      </div>

      <div class="content-section">
        <h2>How AI Was Used</h2>
        <p>${project.aiDescription}</p>
      </div>

      ${tutorialSection}

      <div class="links-row">
        ${liveBtn}
        ${githubBtn}
      </div>
    `;
  }
</script>
</body>
</html>
